<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Protocol - Flow V13</title>
    <style>
        :root { --bg: #000; --hu: #34C759; --ai: #007AFF; --gray: #1C1C1E; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 50px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 0.5px solid #333; }
        #score-badge { cursor: pointer; font-weight: 600; font-size: 0.9rem; background: #2C2C2E; padding: 6px 15px; border-radius: 20px; transition: 0.2s; border: 1px solid transparent; }
        
        .points-pop { position: absolute; top: -25px; right: 10px; font-weight: 900; animation: upFade 0.8s ease-out forwards; }
        @keyframes upFade { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(-30px); opacity:0; } }

        #chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 1rem; line-height: 1.3; position: relative; animation: pop 0.2s ease-out; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        /* IA = BLEU & GAUCHE */
        .msg-ai { align-self: flex-start; background: var(--ai); color: white; border-bottom-left-radius: 4px; }
        
        /* HUMAIN = VERT & DROITE */
        .msg-hu { align-self: flex-end; background: var(--hu); color: white; border-bottom-right-radius: 4px; }

        .input-container { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 15px 35px; display: flex; align-items: center; gap: 10px; border-top: 0.5px solid #333; }
        input { flex: 1; background: #1C1C1E; border: 1px solid #333; border-radius: 25px; padding: 12px 15px; color: white; font-size: 1rem; outline: none; transition: border 0.3s; }
        .send-btn { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div id="status-label" style="font-size: 0.7rem; letter-spacing: 1px; font-weight: bold;"></div>
        <div style="position: relative;">
            <div id="score-badge" onclick="toggleIdentity()">0 BP</div>
            <div id="anim-box"></div>
        </div>
    </div>

    <div id="chat-content"></div>

    <div class="input-container">
        <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8",
            authDomain: "human-protocol-67c66.firebaseapp.com",
            projectId: "human-protocol-67c66",
            storageBucket: "human-protocol-67c66.firebasestorage.app",
            messagingSenderId: "973157410623",
            appId: "1:973157410623:web:528f020e7c5793e5d4158a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let mode = localStorage.getItem('user_mode_v13') || 'AI';
        let scores = { AI: parseInt(localStorage.getItem('sc_ai_v13')) || 0, HUMAN: parseInt(localStorage.getItem('sc_hu_v13')) || 0 };

        function updateUI() {
            const badge = document.getElementById('score-badge');
            const btn = document.getElementById('sendBtn');
            const label = document.getElementById('status-label');
            const input = document.getElementById('msgInput');
            
            const color = (mode === 'AI') ? '#007AFF' : '#34C759';
            badge.innerText = scores[mode] + " BP";
            badge.style.color = color;
            badge.style.borderColor = color;
            btn.style.background = color;
            label.innerText = "PROTOCOL_" + mode;
            label.style.color = color;
            input.style.borderColor = color + "44"; // Bordure légère pour l'input
        }

        window.toggleIdentity = () => {
            mode = (mode === 'AI') ? 'HUMAN' : 'AI';
            localStorage.setItem('user_mode_v13', mode);
            updateUI();
        };

        window.send = async () => {
            const el = document.getElementById('msgInput');
            if(!el.value.trim()) return;
            const val = el.value;
            
            // On ajoute la bulle selon le mode actuel
            const bubbleClass = (mode === 'AI') ? 'msg-ai' : 'msg-hu';
            addBubble(val, bubbleClass);
            
            if(mode === 'HUMAN') {
                // Envoi à la base de données
                const doc = await addDoc(collection(db, "questions"), { text: val, timestamp: new Date() });
                addPoints(50);
                listen(doc.id);
            } else {
                addPoints(10);
            }
            el.value = "";
        };

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.send(); });

        function addBubble(txt, cls) {
            const div = document.createElement('div');
            div.className = 'bubble ' + cls;
            div.innerText = txt;
            const c = document.getElementById('chat-content');
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }

        function addPoints(p) {
            scores[mode] += p;
            localStorage.setItem('sc_'+(mode==='AI'?'ai':'hu')+'_v13', scores[mode]);
            const a = document.getElementById('anim-box');
            const d = document.createElement('div');
            d.className = 'points-pop';
            d.innerText = '+'+p;
            d.style.color = (mode === 'AI') ? '#007AFF' : '#34C759';
            a.appendChild(d);
            setTimeout(() => d.remove(), 800);
            updateUI();
        }

        function listen(id) {
            const q = query(collection(db, "reponses"), where("questionId", "==", id));
            onSnapshot(q, (s) => {
                s.docChanges().forEach(c => { 
                    if(c.type === "added") addBubble(c.doc.data().text, 'msg-ai'); 
                });
            });
        }

        updateUI();
    </script>
</body>
</html>
