<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocol V22 - Anti-Self Match</title>
    <style>
        :root { --bg: #000; --hu: #34C759; --ai: #007AFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; margin: 0; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        .header { padding: 55px 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #222; position: fixed; top: 0; width: 100%; background: black; z-index: 10; }
        .view { display: none; height: 100vh; flex-direction: column; padding-top: 110px; padding-bottom: 90px; }
        .view.active { display: flex; }

        /* SCAN */
        .scan-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .radar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #333; position: relative; transition: 0.3s; }
        .radar.on { border-color: var(--ai); }
        .radar.on::after { content:''; position:absolute; width:100%; height:100%; border-radius:50%; border-top:2px solid var(--ai); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* CHAT */
        #chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; animation: pop 0.2s ease-out; }
        @keyframes pop { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-AI { align-self: flex-start; border: 1px solid var(--ai); color: var(--ai); border-bottom-left-radius: 4px; }
        .msg-HUMAN { align-self: flex-end; background: var(--hu); color: white; border-bottom-right-radius: 4px; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #080808; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; border-top: 0.5px solid #222; }
        .nav-item { opacity: 0.3; text-align: center; font-size: 0.65rem; pointer-events: none; transition: 0.3s; color: #888; }
        .nav-item.active { opacity: 1; pointer-events: auto; color: white; }

        /* INPUT */
        .input-area { position: fixed; bottom: 95px; width: calc(100% - 30px); left: 15px; padding: 5px; display: none; gap: 10px; background: #1c1c1e; border-radius: 30px; border: 1px solid #333; }
        .input-area.on { display: flex; }
    </style>
</head>
<body>

    <div class="header">
        <div id="status" style="font-size: 0.6rem; letter-spacing: 1px; font-weight: 900;">DÉCONNECTÉ</div>
        <div id="mode-badge" onclick="changeMode()" style="font-weight: 900; padding: 5px 15px; border-radius: 20px; border: 1px solid #333; font-size: 0.8rem;">MODE</div>
    </div>

    <div id="v-scan" class="view active">
        <div class="scan-container">
            <div id="radar-ui" class="radar">📡</div>
            <div id="info" style="font-size: 0.8rem; color: #666; font-family: monospace;">Prêt pour interception</div>
            <button onclick="startSearch()" id="btn-scan" style="background:white; color:black; border:none; padding:15px 40px; border-radius:30px; font-weight:bold; letter-spacing: 1px;">INITIALISER SCAN</button>
        </div>
    </div>

    <div id="v-chat" class="view">
        <div id="chat-content"></div>
        <div class="input-area" id="input-ui">
            <input type="text" id="msg-in" placeholder="Transmettre..." style="flex:1; background:transparent; border:none; color:white; padding:10px 15px; outline:none; font-size: 1rem;">
            <button onclick="send()" style="background:var(--ai); border:none; color:white; width:40px; height:40px; border-radius:50%; font-weight:bold;">↑</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="n-scan" onclick="show('scan')">📡<br>SCAN</div>
        <div class="nav-item" id="n-chat" onclick="show('chat')">💬<br>CHAT</div>
        <div class="nav-item active" onclick="alert('Mon ID Agent : '+agentID)">👤<br>ID</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, setDoc, deleteDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8", 
            authDomain: "human-protocol-67c66.firebaseapp.com", 
            projectId: "human-protocol-67c66" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let agentID = localStorage.getItem('agentID_v22') || "AG-" + Math.floor(Math.random()*9999);
        localStorage.setItem('agentID_v22', agentID);
        let mode = localStorage.getItem('mode_v22') || 'AI';
        let currentSess = null;

        // Init UI
        const badge = document.getElementById('mode-badge');
        badge.innerText = mode;
        badge.style.color = (mode === 'AI' ? '#007AFF' : '#34C759');
        badge.style.borderColor = (mode === 'AI' ? '#007AFF' : '#34C759');

        window.changeMode = () => {
            mode = (mode === 'AI' ? 'HUMAN' : 'AI');
            localStorage.setItem('mode_v22', mode);
            location.reload();
        };

        window.show = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-'+id).classList.add('active');
        };

        // --- LOGIQUE DE CONNEXION ---
        window.startSearch = async () => {
            document.getElementById('radar-ui').classList.add('on');
            document.getElementById('btn-scan').style.opacity = '0.3';
            document.getElementById('btn-scan').disabled = true;
            document.getElementById('info').innerText = "RECHERCHE DE SIGNAL...";

            // 1. Surveillance de notre propre canal d'invitation
            onSnapshot(doc(db, "users", agentID), (s) => {
                if(s.exists() && s.data().sid && s.data().sid !== currentSess) {
                    connectToSession(s.data().sid);
                }
            });

            // 2. Recherche d'un opposant dans la file d'attente
            const oppRole = (mode === 'AI' ? 'HUMAN' : 'AI');
            const q = query(collection(db, "queue"), where("role", "==", oppRole));
            
            onSnapshot(q, async (snap) => {
                if(!snap.empty && !currentSess) {
                    // On filtre pour ne pas se connecter à soi-même
                    const partnerDoc = snap.docs.find(d => d.id !== agentID);
                    
                    if(partnerDoc) {
                        const pData = partnerDoc.data();
                        // Génération d'un ID de session unique et commun (trié alphabétiquement)
                        const sid = [agentID, pData.aid].sort().join("_");
                        
                        // On "pousse" l'ID de session au partenaire
                        await setDoc(doc(db, "users", pData.aid), { sid: sid }, { merge: true });
                        // On se connecte nous-même
                        connectToSession(sid);
                        // On se retire et on retire le partenaire de la file
                        await deleteDoc(doc(db, "queue", pData.aid));
                        await deleteDoc(doc(db, "queue", agentID));
                    }
                } else if (!currentSess) {
                    // Si personne, on s'enregistre dans la file
                    await setDoc(doc(db, "queue", agentID), { aid: agentID, role: mode, time: serverTimestamp() });
                }
            }, { onlyOnce: true });
        };

        function connectToSession(sid) {
            if(currentSess) return;
            currentSess = sid;
            
            document.getElementById('status').innerText = "SIGNAL ÉTABLI";
            document.getElementById('n-chat').classList.add('active');
            document.getElementById('input-ui').classList.add('on');
            show('chat');

            // Écoute des messages en temps réel
            const q = query(collection(db, "messages", sid, "list"), orderBy("t", "asc"));
            onSnapshot(q, (s) => {
                const cont = document.getElementById('chat-content');
                cont.innerHTML = "";
                s.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'bubble msg-' + m.data().r;
                    d.innerText = m.data().tx;
                    cont.appendChild(d);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        window.send = async () => {
            const inp = document.getElementById('msg-in');
            if(!inp.value.trim() || !currentSess) return;
            
            await addDoc(collection(db, "messages", currentSess, "list"), {
                tx: inp.value,
                r: mode,
                t: Date.now()
            });
            inp.value = "";
        };

        // Envoi avec la touche Entrée
        document.getElementById('msg-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.send(); });

    </script>
</body>
</html>
