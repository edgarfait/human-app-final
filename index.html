<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Protocol - OS V15</title>
    <style>
        :root { --bg: #000; --hu: #34C759; --ai: #007AFF; --gray: #1C1C1E; --panel: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; }

        /* --- MENU LATÉRAL --- */
        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--panel); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 60px 20px; border-right: 0.5px solid #333; display: flex; flex-direction: column; gap: 25px; }
        #sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 900; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        /* --- CONTENU DU MENU --- */
        .menu-section { border-bottom: 0.5px solid #222; padding-bottom: 15px; }
        .menu-title { font-size: 0.65rem; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; font-weight: 900; }
        .agent-id { font-size: 1.2rem; font-family: monospace; color: var(--ai); }
        select, .pref-item { width: 100%; background: #1c1c1e; border: 1px solid #333; color: white; padding: 10px; border-radius: 10px; font-size: 0.9rem; margin-top: 5px; outline: none; }
        
        /* --- INTERFACE PRINCIPALE --- */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        .header { padding: 50px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 100; border-bottom: 0.5px solid #333; }
        
        /* Bouton Menu */
        .menu-trigger { font-size: 1.5rem; cursor: pointer; color: white; padding: 5px; }
        
        #score-badge { cursor: pointer; font-weight: 600; font-size: 0.85rem; background: #222; padding: 6px 14px; border-radius: 20px; border: 1px solid transparent; transition: 0.3s; }
        .points-pop { position: absolute; top: -25px; right: 10px; font-weight: 900; animation: upFade 0.8s ease-out forwards; }
        @keyframes upFade { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(-30px); opacity:0; } }

        /* --- CHAT --- */
        #chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 120px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; line-height: 1.3; animation: pop 0.25s ease-out; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .msg-AI { align-self: flex-start; background: #262629; color: var(--ai); border: 1px solid var(--ai); border-bottom-left-radius: 4px; }
        .msg-HUMAN { align-self: flex-end; background: var(--hu); color: white; border-bottom-right-radius: 4px; }

        .input-container { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 15px 35px; display: flex; align-items: center; gap: 10px; border-top: 0.5px solid #333; }
        input[type="text"] { flex: 1; background: #1C1C1E; border: 1px solid #333; border-radius: 25px; padding: 12px 18px; color: white; font-size: 1rem; outline: none; }
        .send-btn { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="menu-section">
            <div class="menu-title">Identité d'Agent</div>
            <div class="agent-id" id="display-id">AGENT-XXXX</div>
            <div id="display-grade" style="font-size: 0.7rem; color: #888; margin-top: 5px;">GRADE : RECRUE</div>
        </div>

        <div class="menu-section">
            <div class="menu-title">Fréquence de Langue</div>
            <select id="lang-pref">
                <option value="fr">FRANÇAIS</option>
                <option value="en">ENGLISH</option>
                <option value="es">ESPAÑOL</option>
            </select>
        </div>

        <div class="menu-section">
            <div class="menu-title">Sujets d'Interception</div>
            <select id="topic-pref">
                <option value="life">LA VIE / PHILO</option>
                <option value="study">COURS / ÉCOLE</option>
                <option value="tech">TECH / CODE</option>
            </select>
        </div>

        <div class="menu-section" style="flex:1">
            <div class="menu-title">Dernières Transmissions</div>
            <div id="history-list" style="font-size: 0.7rem; color: #444;">Aucune archive...</div>
        </div>

        <div style="font-size: 0.6rem; color: #333; text-align: center;">HUMAN PROTOCOL v15.0</div>
    </div>

    <div class="overlay" onclick="toggleMenu()"></div>

    <div class="main-content">
        <div class="header">
            <div class="menu-trigger" onclick="toggleMenu()">☰</div>
            <div id="status-label" style="font-size: 0.7rem; letter-spacing: 2px; font-weight: bold;"></div>
            <div style="position: relative;">
                <div id="score-badge" onclick="toggleIdentity()">0 BP</div>
                <div id="anim-box"></div>
            </div>
        </div>

        <div id="chat-content"></div>

        <div class="input-container">
            <input type="text" id="msgInput" placeholder="Saisir data..." autocomplete="off">
            <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8",
            authDomain: "human-protocol-67c66.firebaseapp.com",
            projectId: "human-protocol-67c66",
            storageBucket: "human-protocol-67c66.firebasestorage.app",
            messagingSenderId: "973157410623",
            appId: "1:973157410623:web:528f020e7c5793e5d4158a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GESTION ÉTAT ---
        let mode = localStorage.getItem('mode_v15') || 'AI';
        let scores = { AI: parseInt(localStorage.getItem('sc_ai_v15')) || 0, HUMAN: parseInt(localStorage.getItem('sc_hu_v15')) || 0 };
        let agentID = localStorage.getItem('agent_id') || "AGENT-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('agent_id', agentID);

        function updateUI() {
            const color = (mode === 'AI') ? '#007AFF' : '#34C759';
            document.getElementById('score-badge').innerText = scores[mode] + " BP";
            document.getElementById('score-badge').style.color = color;
            document.getElementById('score-badge').style.borderColor = color;
            document.getElementById('sendBtn').style.background = color;
            document.getElementById('status-label').innerText = "MODE_" + mode;
            document.getElementById('status-label').style.color = color;
            document.getElementById('display-id').innerText = agentID;
            document.getElementById('display-id').style.color = color;

            // Grade logic
            let grade = "RECRUE";
            if(scores[mode] > 500) grade = "AGENT ACTIF";
            if(scores[mode] > 2000) grade = "INFILTRÉ";
            if(scores[mode] > 5000) grade = "MAÎTRE DU RÉSEAU";
            document.getElementById('display-grade').innerText = "GRADE : " + grade;
        }

        window.toggleMenu = () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.overlay').classList.toggle('active');
        };

        window.toggleIdentity = () => {
            mode = (mode === 'AI') ? 'HUMAN' : 'AI';
            localStorage.setItem('mode_v15', mode);
            updateUI();
        };

        // --- MESSAGERIE ---
        window.send = async () => {
            const el = document.getElementById('msgInput');
            if(!el.value.trim()) return;
            
            await addDoc(collection(db, "global_chat"), {
                text: el.value,
                sender: mode,
                agent: agentID,
                timestamp: new Date()
            });
            
            addPoints(mode === 'HUMAN' ? 50 : 10);
            el.value = "";
        };

        const q = query(collection(db, "global_chat"), orderBy("timestamp", "asc"), limit(30));
        onSnapshot(q, (snapshot) => {
            const chat = document.getElementById('chat-content');
            chat.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                addBubble(data.text, 'msg-' + data.sender);
            });
            chat.scrollTop = chat.scrollHeight;
        });

        function addBubble(txt, cls) {
            const div = document.createElement('div');
            div.className = 'bubble ' + cls;
            div.innerText = txt;
            document.getElementById('chat-content').appendChild(div);
        }

        function addPoints(p) {
            scores[mode] += p;
            localStorage.setItem('sc_'+mode.toLowerCase()+'_v15', scores[mode]);
            const d = document.createElement('div');
            d.className = 'points-pop';
            d.innerText = '+'+p;
            d.style.color = (mode === 'AI') ? '#007AFF' : '#34C759';
            document.getElementById('anim-box').appendChild(d);
            setTimeout(() => d.remove(), 800);
            updateUI();
        }

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.send(); });

        updateUI();
    </script>
</body>
</html>
