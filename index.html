<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocol V21 - Stable Sync</title>
    <style>
        :root { --bg: #000; --hu: #34C759; --ai: #007AFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .header { padding: 55px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); z-index: 100; border-bottom: 0.5px solid #222; position: fixed; top: 0; width: 100%; }
        .view { display: none; height: 100vh; flex-direction: column; padding-top: 110px; padding-bottom: 90px; }
        .view.active { display: flex; }
        .scan-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .radar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #333; margin-bottom: 20px; position: relative; }
        .radar.scanning::after { content:''; position:absolute; width:100%; height:100%; border-radius:50%; border-top:2px solid inherit; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; }
        .msg-AI { align-self: flex-start; border: 1px solid var(--ai); color: var(--ai); }
        .msg-HUMAN { align-self: flex-end; background: var(--hu); color: white; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #080808; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #222; }
        .nav-item { opacity: 0.3; text-align: center; font-size: 0.7rem; pointer-events: none; }
        .nav-item.on { opacity: 1; pointer-events: auto; }
        .input-area { position: fixed; bottom: 90px; width: 100%; padding: 10px; display: none; }
        .input-area.on { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="st" style="font-size: 0.6rem; font-weight: 900;">OFFLINE</div>
        <div id="sc" onclick="toggleMode()" style="font-weight: bold; border: 1px solid #333; padding: 5px 15px; border-radius: 20px;">0 BP</div>
    </div>

    <div id="v-scan" class="view active">
        <div class="scan-container">
            <div id="rd" class="radar"></div>
            <button onclick="doScan()" id="bt" style="background:white; color:black; border:none; padding:15px 30px; border-radius:25px; font-weight:bold;">SCANNER</button>
        </div>
    </div>

    <div id="v-chat" class="view">
        <div id="chat-content"></div>
        <div class="input-area" id="ctrl">
            <input type="text" id="in" style="flex:1; background:#111; border:1px solid #333; color:white; padding:12px; border-radius:20px; outline:none;">
            <button onclick="send()" style="background:var(--ai); border:none; color:white; width:40px; border-radius:50%;">↑</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item on" onclick="show('scan')">📡<br>SCAN</div>
        <div class="nav-item" id="nv-ch" onclick="show('chat')">💬<br>CHAT</div>
        <div class="nav-item on" onclick="alert('Agent ID: '+agentID)">👤<br>ID</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, setDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const conf = { apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8", authDomain: "human-protocol-67c66.firebaseapp.com", projectId: "human-protocol-67c66" };
        const app = initializeApp(conf);
        const db = getFirestore(app);

        let mode = localStorage.getItem('mode') || 'AI';
        let agentID = localStorage.getItem('aid') || "AG-" + Math.floor(Math.random()*9999);
        localStorage.setItem('aid', agentID);
        let curSess = null;

        window.toggleMode = () => {
            mode = (mode === 'AI' ? 'HUMAN' : 'AI');
            localStorage.setItem('mode', mode);
            location.reload();
        };

        window.show = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-'+id).classList.add('active');
        };

        // --- SCAN LOGIQUE ---
        window.doScan = async () => {
            document.getElementById('rd').classList.add('scanning');
            document.getElementById('bt').innerText = "RECHERCHE...";
            
            // On surveille si quelqu'un nous a trouvé
            onSnapshot(doc(db, "agents", agentID), (s) => {
                if(s.exists() && s.data().sid) startChat(s.data().sid);
            });

            const opp = (mode === 'AI' ? 'HUMAN' : 'AI');
            const q = query(collection(db, "waiting"), where("role", "==", opp));
            
            onSnapshot(q, async (snap) => {
                if(!snap.empty && !curSess) {
                    const p = snap.docs[0].data();
                    // ID stable : tri alphabétique des deux IDs
                    const sid = [agentID, p.aid].sort().join("_");
                    await setDoc(doc(db, "agents", p.aid), { sid: sid });
                    startChat(sid);
                    await deleteDoc(doc(db, "waiting", p.aid));
                } else if(!curSess) {
                    await setDoc(doc(db, "waiting", agentID), { aid: agentID, role: mode });
                }
            }, {onlyOnce: true});
        };

        function startChat(id) {
            if(curSess) return;
            curSess = id;
            document.getElementById('st').innerText = "ONLINE";
            document.getElementById('nv-ch').classList.add('on');
            document.getElementById('ctrl').classList.add('on');
            show('chat');

            const q = query(collection(db, "sessions", id, "ms"), orderBy("t", "asc"));
            onSnapshot(q, (s) => {
                const c = document.getElementById('chat-content');
                c.innerHTML = "";
                s.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'bubble msg-'+m.data().r;
                    d.innerText = m.data().tx;
                    c.appendChild(d);
                });
                c.scrollTop = c.scrollHeight;
            });
        }

        window.send = async () => {
            const i = document.getElementById('in');
            if(!i.value || !curSess) return;
            await addDoc(collection(db, "sessions", curSess, "ms"), { tx: i.value, r: mode, t: Date.now() });
            i.value = "";
        };

        document.getElementById('sc').innerText = mode;
        document.getElementById('sc').style.color = (mode === 'AI' ? '#007AFF' : '#34C759');
    </script>
</body>
</html>
