<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Protocol - Native</title>
    <style>
        :root { --bg: #000; --accent: #34C759; --ai: #007AFF; --gray: #1C1C1E; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header style iOS */
        .header { padding: 50px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 0.5px solid #333; }
        #score-badge { cursor: pointer; font-weight: 600; font-size: 0.9rem; background: #2C2C2E; padding: 6px 15px; border-radius: 20px; transition: 0.2s; border: 1px solid transparent; }
        .points-pop { position: absolute; top: -25px; right: 10px; color: var(--accent); font-weight: 900; animation: upFade 0.8s ease-out; }
        @keyframes upFade { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(-30px); opacity:0; } }

        /* Zone de Chat */
        #chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 100px; }
        
        .bubble { max-width: 75%; padding: 10px 16px; border-radius: 20px; font-size: 1rem; line-height: 1.3; position: relative; margin-bottom: 2px; }
        
        /* Style iMessage Gauche (IA) */
        .msg-ai { align-self: flex-start; background: #262629; color: white; border-bottom-left-radius: 5px; }
        
        /* Style iMessage Droite (Moi / Humain) */
        .msg-human { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 5px; }
        .msg-me { align-self: flex-end; background: #E9E9EB; color: black; border-bottom-right-radius: 5px; }

        /* Barre d'input style iPhone */
        .input-container { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 15px 30px; display: flex; align-items: center; gap: 10px; border-top: 0.5px solid #333; }
        input { flex: 1; background: #1C1C1E; border: 1px solid #333; border-radius: 25px; padding: 10px 15px; color: white; font-size: 1rem; outline: none; }
        .send-circle { width: 32px; height: 32px; border-radius: 50%; background: var(--ai); display: flex; align-items: center; justify-content: center; border: none; color: white; font-weight: bold; cursor: pointer; }

        .view { display: none; height: 100%; flex-direction: column; }
        .view.active { display: flex; }
        
        /* Bottom Tabs iOS */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; display: none; } /* On cache les tabs pour le chat pur */
    </style>
</head>
<body>

    <div class="header">
        <div id="status-label" style="font-size: 0.7rem; letter-spacing: 1px; color: #8E8E93;">PROTOCOL_ACTIVE</div>
        <div style="position: relative;">
            <div id="score-badge" onclick="toggleIdentity()">0 BP</div>
            <div id="anim-box"></div>
        </div>
    </div>

    <div id="v-chat" class="view active">
        <div id="chat-content"></div>
        <div class="input-container">
            <input type="text" id="msgInput" placeholder="iMessage" autocomplete="off">
            <button class="send-circle" id="sendBtn" onclick="send()">↑</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8",
            authDomain: "human-protocol-67c66.firebaseapp.com",
            projectId: "human-protocol-67c66",
            storageBucket: "human-protocol-67c66.firebasestorage.app",
            messagingSenderId: "973157410623",
            appId: "1:973157410623:web:528f020e7c5793e5d4158a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let mode = localStorage.getItem('mode_v12') || 'AI';
        let scores = { AI: parseInt(localStorage.getItem('sc_ai')) || 0, HUMAN: parseInt(localStorage.getItem('sc_hu')) || 0 };

        function updateUI() {
            const badge = document.getElementById('score-badge');
            const btn = document.getElementById('sendBtn');
            badge.innerText = scores[mode] + " BP";
            badge.style.color = mode === 'AI' ? '#007AFF' : '#34C759';
            badge.style.borderColor = mode === 'AI' ? '#007AFF' : '#34C759';
            btn.style.background = mode === 'AI' ? '#007AFF' : '#34C759';
            document.getElementById('status-label').innerText = "MODE_" + mode;
        }

        window.toggleIdentity = () => {
            mode = (mode === 'AI') ? 'HUMAN' : 'AI';
            localStorage.setItem('mode_v12', mode);
            updateUI();
        };

        window.send = async () => {
            const el = document.getElementById('msgInput');
            if(!el.value.trim()) return;
            const val = el.value;
            addBubble(val, 'msg-me');
            
            if(mode === 'AI') {
                setTimeout(() => addBubble("Analyse en cours...", 'msg-ai'), 700);
                addPoints(10);
            } else {
                const doc = await addDoc(collection(db, "questions"), { text: val, timestamp: new Date() });
                addPoints(50);
                listen(doc.id);
            }
            el.value = "";
        };

        // Envoi avec la touche "Entrée" du clavier iPhone
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') window.send();
        });

        function addBubble(txt, cls) {
            const div = document.createElement('div');
            div.className = 'bubble ' + cls;
            div.innerText = txt;
            const c = document.getElementById('chat-content');
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }

        function addPoints(p) {
            scores[mode] += p;
            localStorage.setItem('sc_'+mode.toLowerCase().substring(0,2), scores[mode]);
            const a = document.getElementById('anim-box');
            const d = document.createElement('div');
            d.className = 'points-pop';
            d.innerText = '+'+p;
            a.appendChild(d);
            setTimeout(() => d.remove(), 800);
            updateUI();
        }

        function listen(id) {
            const q = query(collection(db, "reponses"), where("questionId", "==", id));
            onSnapshot(q, (s) => {
                s.docChanges().forEach(c => { if(c.type==="added") addBubble(c.doc.data().text, 'msg-ai'); });
            });
        }

        updateUI();
    </script>
</body>
</html>
