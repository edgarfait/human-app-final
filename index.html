<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Protocol - Sync V18</title>
    <style>
        :root { --bg: #000; --hu: #34C759; --ai: #007AFF; --gray: #1C1C1E; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        .header { padding: 55px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 100; border-bottom: 0.5px solid #222; }
        #score-badge { cursor: pointer; font-weight: 700; font-size: 0.85rem; background: #222; padding: 6px 14px; border-radius: 20px; border: 1px solid transparent; }
        
        .view { display: none; height: 100vh; flex-direction: column; padding-top: 110px; padding-bottom: 90px; overflow-y: auto; }
        .view.active { display: flex; }

        /* SCAN UI */
        .scan-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .radar { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #333; position: relative; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .radar.scanning::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; border-top-color: inherit; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .scan-btn { background: #333; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        /* CHAT UI */
        #chat-content { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; }
        .msg-AI { align-self: flex-start; background: #1a1a1c; border: 1px solid var(--ai); color: var(--ai); border-bottom-left-radius: 4px; }
        .msg-HUMAN { align-self: flex-end; background: var(--hu); color: white; border-bottom-right-radius: 4px; }
        
        .input-container { position: fixed; bottom: 85px; width: 100%; background: #000; padding: 10px 15px; display: none; align-items: center; gap: 10px; border-top: 0.5px solid #222; }
        .input-container.active { display: flex; }

        /* NAV */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(10,10,10,0.95); display: flex; justify-content: space-around; align-items: center; padding-bottom: 25px; border-top: 0.5px solid #222; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; opacity: 0.5; pointer-events: none; }
        .nav-item.enabled { opacity: 1; pointer-events: auto; }
        .nav-item.active { color: white; }

        .points-pop { position: absolute; top: -25px; right: 10px; font-weight: 900; animation: upFade 0.8s forwards; }
        @keyframes upFade { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(-30px); opacity:0; } }
    </style>
</head>
<body>

    <div class="header">
        <div id="status-label" style="font-size: 0.6rem; letter-spacing: 2px;">DISCONNECTED</div>
        <div style="position: relative;">
            <div id="score-badge" onclick="toggleIdentity()">0 BP</div>
            <div id="anim-box"></div>
        </div>
    </div>

    <div id="v-missions" class="view active">
        <div class="scan-container">
            <div class="radar" id="radar-ui">📡</div>
            <h2 id="match-status">SYSTÈME PRÊT</h2>
            <button class="scan-btn" id="scan-btn" onclick="startScan()">LANCER LE SCAN</button>
        </div>
    </div>

    <div id="v-chat" class="view">
        <div id="chat-content"></div>
        <div class="input-container" id="chat-controls">
            <input type="text" id="msgInput" placeholder="Message crypté..." style="flex:1; background:#111; border:1px solid #333; color:white; padding:12px; border-radius:20px; outline:none;">
            <button onclick="send()" style="background:var(--ai); border:none; color:white; width:35px; height:35px; border-radius:50%;">↑</button>
        </div>
    </div>

    <div id="v-profile" class="view">
        <div style="padding:20px; text-align:center;">
            <h3 id="prof-id">AGENT-XXXX</h3>
            <select id="topic-pref" style="width:100%; background:#111; color:white; padding:15px; border-radius:10px; border:1px solid #333;">
                <option value="life">LA VIE</option>
                <option value="study">COURS</option>
            </select>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item enabled active" id="nav-scan" onclick="nav('missions', this)">📡<br><small>SCAN</small></div>
        <div class="nav-item" id="nav-chat" onclick="nav('chat', this)">💬<br><small>CHAT</small></div>
        <div class="nav-item enabled" onclick="nav('profile', this)">👤<br><small>PROFIL</small></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, setDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8",
            authDomain: "human-protocol-67c66.firebaseapp.com",
            projectId: "human-protocol-67c66",
            storageBucket: "human-protocol-67c66.firebasestorage.app",
            messagingSenderId: "973157410623",
            appId: "1:973157410623:web:528f020e7c5793e5d4158a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let mode = localStorage.getItem('mode_v18') || 'AI';
        let agentID = localStorage.getItem('agent_id') || "AGENT-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('agent_id', agentID);
        let currentSessionId = null;

        function updateUI() {
            const color = (mode === 'AI') ? '#007AFF' : '#34C759';
            document.getElementById('score-badge').style.color = color;
            document.getElementById('score-badge').style.borderColor = color;
            document.getElementById('prof-id').innerText = agentID;
            document.getElementById('radar-ui').style.color = color;
        }

        window.nav = (id, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        };

        window.toggleIdentity = () => {
            mode = (mode === 'AI') ? 'HUMAN' : 'AI';
            localStorage.setItem('mode_v18', mode);
            updateUI();
        };

        // --- MATCHMAKING LOGIQUE ---
        window.startScan = async () => {
            const topic = document.getElementById('topic-pref').value;
            const radar = document.getElementById('radar-ui');
            radar.classList.add('scanning');
            radar.style.borderColor = (mode === 'AI' ? '#007AFF' : '#34C759');
            document.getElementById('match-status').innerText = "RECHERCHE D'UN AGENT...";

            // Écouter si quelqu'un nous invite
            onSnapshot(doc(db, "agents", agentID), (snap) => {
                if(snap.exists() && snap.data().currentSession) {
                    joinSession(snap.data().currentSession);
                }
            });

            // Chercher un partenaire
            const opposite = (mode === 'AI') ? 'HUMAN' : 'AI';
            const q = query(collection(db, "waiting_room"), where("topic", "==", topic), where("role", "==", opposite));
            
            onSnapshot(q, async (snap) => {
                if (!snap.empty && !currentSessionId) {
                    const partner = snap.docs[0].data();
                    const sessionId = "sess_" + Date.now();
                    
                    // On invite le partenaire
                    await setDoc(doc(db, "agents", partner.agent), { currentSession: sessionId }, { merge: true });
                    // On se met nous même dans la session
                    joinSession(sessionId);
                    // On nettoie la salle d'attente
                    await deleteDoc(doc(db, "waiting_room", partner.agent));
                } else if (!currentSessionId) {
                    // On s'inscrit en attente
                    await setDoc(doc(db, "waiting_room", agentID), { agent: agentID, role: mode, topic: topic });
                }
            }, { onlyOnce: true });
        };

        function joinSession(id) {
            if(currentSessionId) return;
            currentSessionId = id;
            document.getElementById('match-status').innerText = "CONNEXION ÉTABLIE";
            document.getElementById('status-label').innerText = "EN LIGNE";
            
            const chatNav = document.getElementById('nav-chat');
            chatNav.classList.add('enabled');
            document.getElementById('chat-controls').classList.add('active');
            
            nav('chat', chatNav);

            // Écoute des messages
            const q = query(collection(db, "sessions", id, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const cont = document.getElementById('chat-content');
                cont.innerHTML = "";
                snap.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'bubble msg-' + m.data().role;
                    div.innerText = m.data().text;
                    cont.appendChild(div);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        window.send = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value || !currentSessionId) return;
            await addDoc(collection(db, "sessions", currentSessionId, "messages"), {
                text: input.value,
                role: mode,
                timestamp: new Date()
            });
            input.value = "";
        };

        updateUI();
    </script>
</body>
</html>
