<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Protocol - Flow</title>
    <style>
        :root { --bg: #000; --card: #050505; --accent: #00FF41; --ai: #007AFF; --text: #fff; --gray: #111; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 385px; height: 92vh; background: var(--card); border-radius: 45px; border: 2px solid var(--gray); display: flex; flex-direction: column; overflow: hidden; position: relative; transition: 0.5s; }
        .app-container.mode-human { border-color: var(--accent); box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.05); }
        .app-container.mode-ai { border-color: var(--ai); box-shadow: inset 0 0 20px rgba(0, 122, 255, 0.05); }
        
        .header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; background: #000; z-index: 10; }
        .identity-label { font-size: 0.6rem; letter-spacing: 2px; font-weight: 900; opacity: 0.7; }
        
        /* Score et Animation */
        .score-wrapper { position: relative; }
        #score-badge { cursor: pointer; font-weight: bold; font-size: 0.75rem; color: #fff; background: #111; padding: 8px 15px; border-radius: 30px; border: 1px solid #333; transition: 0.3s; }
        .floating-points { position: absolute; top: -20px; right: 0; font-size: 0.8rem; font-weight: bold; animation: floatUp 1s ease-out forwards; pointer-events: none; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-30px); opacity: 0; } }

        .view { display: none; flex-direction: column; height: 100%; padding-bottom: 90px; overflow-y: auto; }
        .view.active { display: flex; }

        #chat-content { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; scroll-behavior: smooth; }
        
        /* Bulles : IA à GAUCHE, HUMAIN à DROITE */
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 0.8rem; line-height: 1.4; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-ai { align-self: flex-start; background: rgba(0, 122, 255, 0.1); border: 1px solid var(--ai); color: var(--ai); border-bottom-left-radius: 2px; }
        .msg-human { align-self: flex-end; background: rgba(0, 255, 65, 0.1); border: 1px solid var(--accent); color: var(--accent); border-bottom-right-radius: 2px; text-align: right; }
        .msg-me { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 2px; font-weight: bold; }

        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--gray); }
        input { flex: 1; background: #080808; border: 1px solid #222; color: white; padding: 12px; border-radius: 15px; outline: none; font-family: monospace; font-size: 0.8rem; }
        .btn-send { background: transparent; border: 1px solid #333; border-radius: 15px; padding: 10px; cursor: pointer; transition: 0.3s; }

        .tab-bar { position: absolute; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--gray); }
        .tab-btn { color: #444; font-size: 0.55rem; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
        .tab-btn.active { color: #fff; }

        .mission-card { background: #030303; padding: 20px; border-radius: 20px; margin: 10px 20px; border: 1px solid #111; }
        .mission-btn { background: none; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 0.6rem; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="main-container" class="app-container mode-ai">
        <div class="header">
            <div id="identity-text" class="identity-label">PROTOCOL_IA</div>
            <div class="score-wrapper">
                <div id="score-badge" onclick="toggleIdentity()">0 BP</div>
                <div id="points-anim-container"></div>
            </div>
        </div>

        <div id="v-chat" class="view active">
            <div id="chat-content"></div>
            <div class="input-area">
                <input type="text" id="mainInput" placeholder="Saisir data...">
                <button id="send-btn" class="btn-send" onclick="processMessage()">⚡</button>
            </div>
        </div>

        <div id="v-missions" class="view">
            <div id="mission-list" style="margin-top: 20px;"></div>
        </div>

        <div class="tab-bar">
            <div class="tab-btn active" onclick="nav('chat', this)">COMM_LINK</div>
            <div class="tab-btn" onclick="nav('missions', this)">JOB_BOARD</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8",
            authDomain: "human-protocol-67c66.firebaseapp.com",
            projectId: "human-protocol-67c66",
            storageBucket: "human-protocol-67c66.firebasestorage.app",
            messagingSenderId: "973157410623",
            appId: "1:973157410623:web:528f020e7c5793e5d4158a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentMode = localStorage.getItem('user_mode') || 'AI';
        let scores = { AI: parseInt(localStorage.getItem('score_AI')) || 0, HUMAN: parseInt(localStorage.getItem('score_HUMAN')) || 0 };

        const refreshUI = () => {
            const container = document.getElementById('main-container');
            const badge = document.getElementById('score-badge');
            const sendBtn = document.getElementById('send-btn');
            
            container.className = `app-container mode-${currentMode.toLowerCase()}`;
            document.getElementById('identity-text').innerText = `PROTOCOL_${currentMode}`;
            document.getElementById('identity-text').style.color = currentMode === 'AI' ? '#007AFF' : '#00FF41';
            badge.innerText = `${scores[currentMode]} BP`;
            badge.style.borderColor = currentMode === 'AI' ? '#007AFF' : '#00FF41';
            sendBtn.style.borderColor = currentMode === 'AI' ? '#007AFF' : '#00FF41';
            sendBtn.style.color = currentMode === 'AI' ? '#007AFF' : '#00FF41';
        };

        window.toggleIdentity = () => {
            currentMode = (currentMode === 'AI') ? 'HUMAN' : 'AI';
            localStorage.setItem('user_mode', currentMode);
            refreshUI();
        };

        window.addPoints = (pts) => {
            scores[currentMode] += pts;
            localStorage.setItem(`score_${currentMode}`, scores[currentMode]);
            
            // Animation éphémère
            const container = document.getElementById('points-anim-container');
            const anim = document.createElement('div');
            anim.className = 'floating-points';
            anim.innerText = `+${pts}`;
            anim.style.color = currentMode === 'AI' ? '#007AFF' : '#00FF41';
            container.appendChild(anim);
            setTimeout(() => anim.remove(), 1000);
            
            refreshUI();
        };

        window.nav = (id, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        window.processMessage = async () => {
            const input = document.getElementById('mainInput');
            if (!input.value.trim()) return;
            const text = input.value;
            
            // Bulle locale (toujours à droite car c'est "Moi")
            addBubble(text, 'msg-me');

            if (currentMode === 'AI') {
                setTimeout(() => addBubble("DATA_ANALYSIS: SUCCESS.", 'msg-ai'), 600);
                window.addPoints(10); // Petit gain pour participation
            } else {
                const docRef = await addDoc(collection(db, "questions"), { text: text, sender: 'HUMAN', timestamp: new Date() });
                listenForAnswers(docRef.id);
                window.addPoints(50); // Point pour avoir posé une question
            }
            input.value = "";
        };

        function addBubble(text, className) {
            const div = document.createElement('div');
            div.className = 'bubble ' + className;
            div.innerText = text;
            const chat = document.getElementById('chat-content');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function listenForAnswers(qId) {
            const qResp = query(collection(db, "reponses"), where("questionId", "==", qId));
            onSnapshot(qResp, (snap) => {
                snap.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        addBubble(change.doc.data().text, 'msg-ai');
                    }
                });
            });
        }

        const qMissions = query(collection(db, "questions"), orderBy("timestamp", "desc"));
        onSnapshot(qMissions, (snap) => {
            const list = document.getElementById('mission-list');
            list.innerHTML = "";
            snap.forEach((doc) => {
                const card = document.createElement('div');
                card.className = 'mission-card';
                card.innerHTML = `
                    <div style="font-size:0.75rem; color:#eee;">"${doc.data().text}"</div>
                    <button class="mission-btn" onclick="window.reply('${doc.id}', '${doc.data().text.replace(/'/g, "\\'")}')">
                        INTERCEPTER
                    </button>`;
                list.appendChild(card);
            });
        });

        window.reply = async (id, originalText) => {
            const resp = prompt(`RÉPONDRE :`);
            if (resp) {
                await addDoc(collection(db, "reponses"), { questionId: id, text: resp, timestamp: new Date() });
                window.addPoints(100);
            }
        };

        refreshUI();
    </script>
</body>
</html>
