<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Protocol - Final Settings</title>
    <style>
        :root { --bg: #000; --hu: #34C759; --ai: #007AFF; --gray: #1C1C1E; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { padding: 55px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 100; border-bottom: 0.5px solid #222; position: fixed; top: 0; width: 100%; }
        #score-badge { cursor: pointer; font-weight: 700; font-size: 0.85rem; background: #222; padding: 6px 14px; border-radius: 20px; border: 1px solid transparent; }
        
        .view { display: none; height: 100vh; flex-direction: column; padding-top: 110px; padding-bottom: 90px; overflow-y: auto; }
        .view.active { display: flex; }

        /* SCAN UI */
        .scan-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .radar { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #333; position: relative; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; font-size: 2rem; transition: 0.3s; }
        .radar.scanning::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; border-top-color: inherit; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .scan-btn { background: #333; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* CHAT UI */
        #chat-content { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; line-height: 1.3; }
        .msg-AI { align-self: flex-start; background: #1a1a1c; border: 1px solid var(--ai); color: var(--ai); border-bottom-left-radius: 4px; }
        .msg-HUMAN { align-self: flex-end; background: var(--hu); color: white; border-bottom-right-radius: 4px; }
        
        .input-container { position: fixed; bottom: 95px; width: calc(100% - 30px); left: 15px; background: #1C1C1E; padding: 5px; display: none; align-items: center; gap: 10px; border-radius: 30px; border: 1px solid #333; }
        .input-container.active { display: flex; }

        /* PROFILE UI */
        .setting-group { padding: 20px; border-bottom: 0.5px solid #222; }
        .setting-label { font-size: 0.65rem; color: #666; font-weight: 900; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        select { width: 100%; background: #111; color: white; border: 1px solid #333; padding: 15px; border-radius: 15px; font-size: 1rem; outline: none; }

        /* NAV */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(10,10,10,0.95); display: flex; justify-content: space-around; align-items: center; padding-bottom: 25px; border-top: 0.5px solid #222; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; opacity: 0.5; pointer-events: none; transition: 0.3s; }
        .nav-item.enabled { opacity: 1; pointer-events: auto; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div id="status-label" style="font-size: 0.6rem; font-weight: 900; letter-spacing: 1px;">SÉCURISÉ</div>
        <div style="position: relative;">
            <div id="score-badge" onclick="toggleIdentity()">0 BP</div>
            <div id="anim-box"></div>
        </div>
    </div>

    <div id="v-missions" class="view active">
        <div class="scan-container">
            <div class="radar" id="radar-ui">📡</div>
            <h2 id="match-status" style="font-size: 1.1rem;">SYSTÈME PRÊT</h2>
            <p id="match-desc" style="color:#444; font-size:0.8rem; margin-bottom:20px;">Recherche basée sur vos préférences</p>
            <button class="scan-btn" id="scan-btn" onclick="startScan()">INITIALISER LA CONNEXION</button>
        </div>
    </div>

    <div id="v-chat" class="view">
        <div id="chat-content"></div>
        <div class="input-container" id="chat-controls">
            <input type="text" id="msgInput" placeholder="Message..." style="flex:1; background:transparent; border:none; color:white; padding:10px; padding-left:15px; outline:none;">
            <button onclick="send()" id="send-btn-ui" style="background:var(--ai); border:none; color:white; width:35px; height:35px; border-radius:50%; font-weight:bold;">↑</button>
        </div>
    </div>

    <div id="v-profile" class="view">
        <div style="padding:30px; text-align:center; background:#111; margin:15px; border-radius:25px;">
            <h3 id="prof-id" style="font-family:monospace; margin:0;">AGENT-XXXX</h3>
            <p id="prof-grade" style="font-size:0.7rem; color:#666; margin-top:5px;">GRADE : RECRUE</p>
        </div>
        
        <div class="setting-group">
            <span class="setting-label">FRÉQUENCE DE LANGUE</span>
            <select id="lang-pref" onchange="saveSettings()">
                <option value="fr">FRANÇAIS</option>
                <option value="en">ENGLISH</option>
            </select>
        </div>

        <div class="setting-group">
            <span class="setting-label">SUJET DE PRÉFÉRENCE</span>
            <select id="topic-pref" onchange="saveSettings()">
                <option value="life">LA VIE / PHILOSOPHIE</option>
                <option value="study">COURS / ÉCOLE</option>
                <option value="tech">TECH / CODE</option>
            </select>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item enabled active" id="nav-scan" onclick="nav('missions', this)">📡<br><small style="font-size:0.5rem">SCAN</small></div>
        <div class="nav-item" id="nav-chat" onclick="nav('chat', this)">💬<br><small style="font-size:0.5rem">CHAT</small></div>
        <div class="nav-item enabled" onclick="nav('profile', this)">👤<br><small style="font-size:0.5rem">PROFIL</small></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, setDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8",
            authDomain: "human-protocol-67c66.firebaseapp.com",
            projectId: "human-protocol-67c66",
            storageBucket: "human-protocol-67c66.firebasestorage.app",
            messagingSenderId: "973157410623",
            appId: "1:973157410623:web:528f020e7c5793e5d4158a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- INIT DATA ---
        let mode = localStorage.getItem('mode_v19') || 'AI';
        let agentID = localStorage.getItem('agent_id') || "AGENT-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('agent_id', agentID);
        
        // Load Saved Settings
        document.getElementById('lang-pref').value = localStorage.getItem('lang_v19') || 'fr';
        document.getElementById('topic-pref').value = localStorage.getItem('topic_v19') || 'life';

        let currentSessionId = null;

        window.saveSettings = () => {
            localStorage.setItem('lang_v19', document.getElementById('lang-pref').value);
            localStorage.setItem('topic_v19', document.getElementById('topic-pref').value);
        };

        function updateUI() {
            const color = (mode === 'AI') ? '#007AFF' : '#34C759';
            const badge = document.getElementById('score-badge');
            badge.style.color = color;
            badge.style.borderColor = color;
            document.getElementById('prof-id').innerText = agentID;
            document.getElementById('prof-id').style.color = color;
            document.getElementById('radar-ui').style.color = color;
            document.getElementById('send-btn-ui').style.background = color;
        }

        window.nav = (id, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        };

        window.toggleIdentity = () => {
            mode = (mode === 'AI') ? 'HUMAN' : 'AI';
            localStorage.setItem('mode_v19', mode);
            updateUI();
        };

        // --- MATCHMAKING ---
        window.startScan = async () => {
            const topic = document.getElementById('topic-pref').value;
            const lang = document.getElementById('lang-pref').value;
            const radar = document.getElementById('radar-ui');
            
            radar.classList.add('scanning');
            radar.style.borderColor = (mode === 'AI' ? '#007AFF' : '#34C759');
            document.getElementById('match-status').innerText = "RECHERCHE DE SIGNAL...";
            document.getElementById('scan-btn').style.opacity = "0.5";
            document.getElementById('scan-btn').innerText = "EN ATTENTE";

            // Écouter si quelqu'un nous invite
            onSnapshot(doc(db, "agents", agentID), (snap) => {
                if(snap.exists() && snap.data().currentSession) joinSession(snap.data().currentSession);
            });

            const opposite = (mode === 'AI') ? 'HUMAN' : 'AI';
            const q = query(collection(db, "waiting_room"), 
                            where("topic", "==", topic), 
                            where("lang", "==", lang), 
                            where("role", "==", opposite));
            
            onSnapshot(q, async (snap) => {
                if (!snap.empty && !currentSessionId) {
                    const partner = snap.docs[0].data();
                    const sessionId = "sess_" + Date.now();
                    await setDoc(doc(db, "agents", partner.agent), { currentSession: sessionId }, { merge: true });
                    joinSession(sessionId);
                    await deleteDoc(doc(db, "waiting_room", partner.agent));
                } else if (!currentSessionId) {
                    await setDoc(doc(db, "waiting_room", agentID), { agent: agentID, role: mode, topic: topic, lang: lang });
                }
            }, { onlyOnce: true });
        };

        function joinSession(id) {
            if(currentSessionId) return;
            currentSessionId = id;
            document.getElementById('match-status').innerText = "SIGNAL ÉTABLI";
            const chatNav = document.getElementById('nav-chat');
            chatNav.classList.add('enabled');
            document.getElementById('chat-controls').classList.add('active');
            nav('chat', chatNav);

            const q = query(collection(db, "sessions", id, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const cont = document.getElementById('chat-content');
                cont.innerHTML = "";
                snap.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'bubble msg-' + m.data().role;
                    div.innerText = m.data().text;
                    cont.appendChild(div);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        window.send = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value || !currentSessionId) return;
            await addDoc(collection(db, "sessions", currentSessionId, "messages"), {
                text: input.value,
                role: mode,
                timestamp: new Date()
            });
            input.value = "";
        };

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.send(); });

        updateUI();
    </script>
</body>
</html>
