<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edgar & Gabrielle Link</title>
    <style>
        :root { --bg: #000; --edgar: #007AFF; --gabrielle: #FF69B4; --gray: #1C1C1E; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 50px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 0.5px solid #333; }
        #score-badge { cursor: pointer; font-weight: 600; font-size: 0.9rem; background: #2C2C2E; padding: 6px 15px; border-radius: 20px; border: 1px solid transparent; }
        
        .points-pop { position: absolute; top: -25px; right: 10px; font-weight: 900; animation: upFade 0.8s ease-out forwards; }
        @keyframes upFade { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(-30px); opacity:0; } }

        #chat-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 110px; }
        
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 1rem; line-height: 1.3; position: relative; animation: pop 0.2s ease-out; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        /* Edgar = BLEU & GAUCHE */
        .msg-EDGAR { align-self: flex-start; background: var(--edgar); color: white; border-bottom-left-radius: 4px; }
        
        /* Gabrielle = ROSE & DROITE */
        .msg-GABRIELLE { align-self: flex-end; background: var(--gabrielle); color: white; border-bottom-right-radius: 4px; }

        .input-container { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 15px 35px; display: flex; align-items: center; gap: 10px; border-top: 0.5px solid #333; }
        input { flex: 1; background: #1C1C1E; border: 1px solid #333; border-radius: 25px; padding: 12px 15px; color: white; font-size: 1rem; outline: none; }
        .send-btn { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: white; font-weight: bold; cursor: pointer; transition: background 0.3s; }
    </style>
</head>
<body>

    <div class="header">
        <div id="identity-label" style="font-size: 0.7rem; letter-spacing: 2px; font-weight: 900; font-family: monospace;"></div>
        <div style="position: relative;">
            <div id="score-badge" onclick="toggleIdentity()">0 BP</div>
            <div id="anim-box"></div>
        </div>
    </div>

    <div id="chat-content"></div>

    <div class="input-container">
        <input type="text" id="msgInput" placeholder="Saisir message..." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Ta config Firebase reste la même
        const firebaseConfig = {
            apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8",
            authDomain: "human-protocol-67c66.firebaseapp.com",
            projectId: "human-protocol-67c66",
            storageBucket: "human-protocol-67c66.firebasestorage.app",
            messagingSenderId: "973157410623",
            appId: "1:973157410623:web:528f020e7c5793e5d4158a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GESTION DES IDENTITÉS ---
        let currentMode = localStorage.getItem('mode_eg_v15') || 'EDGAR'; // EDGAR ou GABRIELLE
        let scores = { 
            EDGAR: parseInt(localStorage.getItem('sc_edgar')) || 0, 
            GABRIELLE: parseInt(localStorage.getItem('sc_gabrielle')) || 0 
        };

        function updateUI() {
            const badge = document.getElementById('score-badge');
            const btn = document.getElementById('sendBtn');
            const label = document.getElementById('identity-label');
            const placeholder = document.getElementById('msgInput');
            
            // Couleurs Dynamiques
            const color = (currentMode === 'EDGAR') ? '#007AFF' : '#FF69B4'; // Bleu ou Rose
            
            badge.innerText = scores[currentMode] + " BP";
            badge.style.color = color;
            badge.style.borderColor = color;
            btn.style.background = color;
            
            // Textes Dynamiques
            label.innerText = (currentMode === 'EDGAR') ? 'EDGAR_SYS' : 'GABRIELLE_NET';
            label.style.color = color;
            placeholder.placeholder = (currentMode === 'EDGAR') ? 'Message pour Gabrielle...' : 'Message pour Edgar...';
        }

        window.toggleIdentity = () => {
            currentMode = (currentMode === 'EDGAR') ? 'GABRIELLE' : 'EDGAR';
            localStorage.setItem('mode_eg_v15', currentMode);
            updateUI();
        };

        // --- ENVOI DES MESSAGES ---
        window.send = async () => {
            const el = document.getElementById('msgInput');
            if(!el.value.trim()) return;
            const val = el.value;
            
            // On envoie à Firebase avec le nouvel identifiant
            await addDoc(collection(db, "edgar_gabrielle_link"), {
                text: val,
                sender: currentMode,
                timestamp: new Date()
            });
            
            addPoints(25); // Gain standard pour participation
            el.value = "";
        };

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.send(); });

        // --- ÉCOUTE GLOBALE (Synchro Directe) ---
        const q = query(collection(db, "edgar_gabrielle_link"), orderBy("timestamp", "asc"), limit(70));
        onSnapshot(q, (snapshot) => {
            const chat = document.getElementById('chat-content');
            chat.innerHTML = ""; 
            snapshot.forEach((doc) => {
                const data = doc.data();
                addBubble(data.text, 'msg-' + data.sender);
            });
            chat.scrollTop = chat.scrollHeight;
        });

        function addBubble(txt, cls) {
            const div = document.createElement('div');
            div.className = 'bubble ' + cls;
            div.innerText = txt;
            document.getElementById('chat-content').appendChild(div);
        }

        function addPoints(p) {
            scores[currentMode] += p;
            localStorage.setItem('sc_'+currentMode.toLowerCase(), scores[currentMode]);
            const a = document.getElementById('anim-box');
            const d = document.createElement('div');
            d.className = 'points-pop';
            d.innerText = '+'+p;
            d.style.color = (currentMode === 'EDGAR') ? '#007AFF' : '#FF69B4';
            a.appendChild(d);
            setTimeout(() => d.remove(), 800);
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
