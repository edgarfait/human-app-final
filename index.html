<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, setDoc, deleteDoc, orderBy, serverTimestamp, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8", authDomain: "human-protocol-67c66.firebaseapp.com", projectId: "human-protocol-67c66" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let agentID = localStorage.getItem('agentID_v23') || "AG-" + Math.floor(1000 + Math.random()*8999);
    localStorage.setItem('agentID_v23', agentID);
    let mode = localStorage.getItem('mode_v23') || 'AI';
    let currentSess = null;

    // UI Initial
    const badge = document.getElementById('mode-badge');
    badge.innerText = mode;
    badge.style.color = (mode === 'AI' ? '#007AFF' : '#34C759');
    document.getElementById('prof-id-ui').innerText = agentID;
    document.getElementById('prof-id-ui').style.color = (mode === 'AI' ? '#007AFF' : '#34C759');

    window.savePrefs = () => {
        localStorage.setItem('topic_v23', document.getElementById('topic-pref').value);
        localStorage.setItem('lang_v23', document.getElementById('lang-pref').value);
    };

    window.changeMode = () => {
        mode = (mode === 'AI' ? 'HUMAN' : 'AI');
        localStorage.setItem('mode_v23', mode);
        location.reload();
    };

    window.nav = (id, el) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    };

    // --- LOGIQUE DE CONNEXION AVEC NETTOYAGE ---
    window.startSearch = async () => {
        const topic = document.getElementById('topic-pref').value;
        const lang = document.getElementById('lang-pref').value;
        
        // 1. NETTOYAGE CRITIQUE : On efface les traces de l'ancienne session
        currentSess = null; 
        document.getElementById('chat-content').innerHTML = ""; // Vide l'écran
        try {
            // On supprime l'ID de session sur notre profil Firebase pour ne pas auto-rejoindre
            await setDoc(doc(db, "users", agentID), { sid: deleteField() }, { merge: true });
            // On s'assure qu'on n'est pas déjà dans une file d'attente fantôme
            await deleteDoc(doc(db, "queue", agentID));
        } catch(e) { console.log("Nettoyage..."); }

        document.getElementById('radar-ui').classList.add('on');
        document.getElementById('btn-scan').style.opacity = '0.3';
        document.getElementById('info').innerText = "RECHERCHE DE SIGNAL...";

        // 2. Surveillance de notre propre canal (pour être invité)
        onSnapshot(doc(db, "users", agentID), (s) => {
            if(s.exists() && s.data().sid && s.data().sid !== currentSess) {
                connectToSession(s.data().sid);
            }
        });

        // 3. Recherche d'un opposant
        const oppRole = (mode === 'AI' ? 'HUMAN' : 'AI');
        const q = query(collection(db, "queue"), 
                        where("role", "==", oppRole), 
                        where("topic", "==", topic), 
                        where("lang", "==", lang));
        
        onSnapshot(q, async (snap) => {
            if(!snap.empty && !currentSess) {
                const partnerDoc = snap.docs.find(d => d.id !== agentID);
                if(partnerDoc) {
                    const sid = [agentID, partnerDoc.id].sort().join("_");
                    // On invite le partenaire
                    await setDoc(doc(db, "users", partnerDoc.id), { sid: sid }, { merge: true });
                    // On se connecte
                    connectToSession(sid);
                    // On nettoie la file
                    await deleteDoc(doc(db, "queue", partnerDoc.id));
                    await deleteDoc(doc(db, "queue", agentID));
                }
            } else if (!currentSess) {
                // Inscription propre dans la file
                await setDoc(doc(db, "queue", agentID), { aid: agentID, role: mode, topic: topic, lang: lang, time: serverTimestamp() });
            }
        }, { onlyOnce: true });
    };

    function connectToSession(sid) {
        if(currentSess) return;
        currentSess = sid;
        document.getElementById('n-chat').classList.add('enabled');
        document.getElementById('input-ui').classList.add('on');
        document.getElementById('status').innerText = "SIGNAL ÉTABLI";
        nav('chat', document.getElementById('n-chat'));

        const q = query(collection(db, "messages", sid, "list"), orderBy("t", "asc"));
        onSnapshot(q, (s) => {
            const cont = document.getElementById('chat-content');
            cont.innerHTML = "";
            s.forEach(m => {
                const d = document.createElement('div');
                d.className = 'bubble msg-' + m.data().r;
                d.innerText = m.data().tx;
                cont.appendChild(d);
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    window.send = async () => {
        const inp = document.getElementById('msg-in');
        if(!inp.value.trim() || !currentSess) return;
        await addDoc(collection(db, "messages", currentSess, "list"), { tx: inp.value, r: mode, t: Date.now() });
        inp.value = "";
    };

    document.getElementById('msg-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.send(); });

</script>
