<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Protocol - OS V16</title>
    <style>
        :root { --bg: #000; --hu: #34C759; --ai: #007AFF; --gray: #1C1C1E; --card: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        /* --- HEADER --- */
        .header { padding: 55px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 100; border-bottom: 0.5px solid #222; }
        #score-badge { cursor: pointer; font-weight: 700; font-size: 0.85rem; background: #222; padding: 6px 14px; border-radius: 20px; border: 1px solid transparent; }
        
        /* --- VUES --- */
        .view { display: none; height: 100vh; flex-direction: column; padding-top: 110px; padding-bottom: 90px; overflow-y: auto; }
        .view.active { display: flex; }

        /* --- CHAT --- */
        #chat-content { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; line-height: 1.3; }
        .msg-AI { align-self: flex-start; background: #1a1a1c; border: 1px solid var(--ai); color: var(--ai); border-bottom-left-radius: 4px; }
        .msg-HUMAN { align-self: flex-end; background: var(--hu); color: white; border-bottom-right-radius: 4px; }

        .input-container { position: fixed; bottom: 85px; width: 100%; background: #000; padding: 10px 15px; display: flex; align-items: center; gap: 10px; z-index: 50; }
        input[type="text"] { flex: 1; background: #1C1C1E; border: 1px solid #333; border-radius: 25px; padding: 12px 18px; color: white; outline: none; }

        /* --- PROFIL & RÉGLAGES --- */
        .profile-card { background: var(--card); margin: 20px; padding: 25px; border-radius: 25px; border: 1px solid #222; text-align: center; }
        .setting-row { margin: 20px; display: flex; flex-direction: column; gap: 8px; }
        select { background: #1C1C1E; color: white; border: 1px solid #333; padding: 12px; border-radius: 12px; font-size: 1rem; width: 100%; }

        /* --- BARRE DE NAVIGATION BASSE --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; padding-bottom: 25px; border-top: 0.5px solid #222; z-index: 200; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #555; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: white; }
        .nav-icon { font-size: 1.4rem; }
        .nav-label { font-size: 0.6rem; font-weight: bold; letter-spacing: 1px; }

        /* Animation Points */
        .points-pop { position: absolute; top: -25px; right: 10px; font-weight: 900; animation: upFade 0.8s ease-out forwards; }
        @keyframes upFade { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(-30px); opacity:0; } }
    </style>
</head>
<body>

    <div class="header">
        <div id="status-label" style="font-size: 0.7rem; letter-spacing: 2px; font-weight: 900;">PROTOCOL_ACTIVE</div>
        <div style="position: relative;">
            <div id="score-badge" onclick="toggleIdentity()">0 BP</div>
            <div id="anim-box"></div>
        </div>
    </div>

    <div id="v-chat" class="view active">
        <div id="chat-content"></div>
        <div class="input-container">
            <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
            <button style="width:35px; height:35px; border-radius:50%; border:none; background:var(--ai); color:white;" onclick="send()">↑</button>
        </div>
    </div>

    <div id="v-missions" class="view">
        <div style="padding: 20px;">
            <h2 style="font-size: 1.2rem; color: var(--hu);">RECHERCHE DE FRÉQUENCE</h2>
            <p style="color: #666; font-size: 0.8rem;">Sélectionnez un canal pour intercepter une discussion.</p>
            <div style="background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222; margin-top: 20px; text-align: center;">
                <div style="font-size: 2rem; margin-bottom: 10px;">📡</div>
                <div style="font-weight: bold;">SCAN EN COURS...</div>
            </div>
        </div>
    </div>

    <div id="v-profile" class="view">
        <div class="profile-card">
            <div id="prof-id" style="font-size: 1.4rem; font-family: monospace; color: var(--ai); margin-bottom: 5px;">AGENT-XXXX</div>
            <div id="prof-grade" style="font-size: 0.7rem; color: #888; letter-spacing: 1px;">GRADE : RECRUE</div>
        </div>
        
        <div class="setting-row">
            <label style="font-size: 0.65rem; color: #666; font-weight: 900; margin-left: 5px;">LANGUE DU PROTOCOLE</label>
            <select id="lang-pref">
                <option value="fr">FRANÇAIS</option>
                <option value="en">ENGLISH</option>
            </select>
        </div>

        <div class="setting-row">
            <label style="font-size: 0.65rem; color: #666; font-weight: 900; margin-left: 5px;">SUJET DE PRÉFÉRENCE</label>
            <select id="topic-pref">
                <option value="life">LA VIE / PHILOSOPHIE</option>
                <option value="study">COURS / ÉCOLE</option>
                <option value="tech">TECH / CODE</option>
            </select>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('chat', this)">
            <span class="nav-icon">💬</span>
            <span class="nav-label">FLUX</span>
        </div>
        <div class="nav-item" onclick="nav('missions', this)">
            <span class="nav-icon">🎯</span>
            <span class="nav-label">MISSIONS</span>
        </div>
        <div class="nav-item" onclick="nav('profile', this)">
            <span class="nav-icon">👤</span>
            <span class="nav-label">PROFIL</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfuKPT9iSB-tpCAP3pCrRp98NlzOcNHG8",
            authDomain: "human-protocol-67c66.firebaseapp.com",
            projectId: "human-protocol-67c66",
            storageBucket: "human-protocol-67c66.firebasestorage.app",
            messagingSenderId: "973157410623",
            appId: "1:973157410623:web:528f020e7c5793e5d4158a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let mode = localStorage.getItem('mode_v16') || 'AI';
        let scores = { AI: parseInt(localStorage.getItem('sc_ai_v16')) || 0, HUMAN: parseInt(localStorage.getItem('sc_hu_v16')) || 0 };
        let agentID = localStorage.getItem('agent_id') || "AGENT-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('agent_id', agentID);

        function updateUI() {
            const color = (mode === 'AI') ? '#007AFF' : '#34C759';
            document.getElementById('score-badge').innerText = scores[mode] + " BP";
            document.getElementById('score-badge').style.color = color;
            document.getElementById('score-badge').style.borderColor = color;
            document.getElementById('status-label').innerText = "MODE_" + mode;
            document.getElementById('status-label').style.color = color;
            document.getElementById('prof-id').innerText = agentID;
            document.getElementById('prof-id').style.color = color;
            
            let grade = "RECRUE";
            if(scores[mode] > 500) grade = "AGENT ACTIF";
            if(scores[mode] > 2000) grade = "INFILTRÉ";
            document.getElementById('prof-grade').innerText = "GRADE : " + grade;
        }

        window.nav = (id, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        };

        window.toggleIdentity = () => {
            mode = (mode === 'AI') ? 'HUMAN' : 'AI';
            localStorage.setItem('mode_v16', mode);
            updateUI();
        };

        window.send = async () => {
            const el = document.getElementById('msgInput');
            if(!el.value.trim()) return;
            await addDoc(collection(db, "global_chat"), { text: el.value, sender: mode, agent: agentID, timestamp: new Date() });
            addPoints(mode === 'HUMAN' ? 50 : 10);
            el.value = "";
        };

        const q = query(collection(db, "global_chat"), orderBy("timestamp", "asc"), limit(30));
        onSnapshot(q, (snap) => {
            const chat = document.getElementById('chat-content');
            chat.innerHTML = "";
            snap.forEach((doc) => addBubble(doc.data().text, 'msg-' + doc.data().sender));
            chat.scrollTop = chat.scrollHeight;
        });

        function addBubble(txt, cls) {
            const div = document.createElement('div');
            div.className = 'bubble ' + cls;
            div.innerText = txt;
            document.getElementById('chat-content').appendChild(div);
        }

        function addPoints(p) {
            scores[mode] += p;
            localStorage.setItem('sc_'+mode.toLowerCase()+'_v16', scores[mode]);
            const d = document.createElement('div');
            d.className = 'points-pop';
            d.innerText = '+'+p;
            d.style.color = (mode === 'AI') ? '#007AFF' : '#34C759';
            document.getElementById('anim-box').appendChild(d);
            setTimeout(() => d.remove(), 800);
            updateUI();
        }

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.send(); });

        updateUI();
    </script>
</body>
</html>
