<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human vs AI - Protocol</title>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #00FF41; --ai: #007AFF; --text: #fff; --gray: #222; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .app-container {
            width: 100%; max-width: 385px; height: 85vh; background: var(--card); border-radius: 45px; border: 8px solid #222;
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        /* SELECTEUR DE MODE */
        .mode-selector {
            padding: 15px; display: flex; gap: 10px; background: #000; border-bottom: 1px solid var(--gray);
        }
        .btn-mode {
            flex: 1; padding: 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 900; cursor: pointer;
            border: 2px solid var(--gray); text-align: center; transition: 0.3s; color: #555;
        }
        .btn-mode.active-ai { border-color: var(--ai); color: var(--ai); background: rgba(0, 122, 255, 0.1); }
        .btn-mode.active-human { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 65, 0.1); }

        /* CHAT */
        #chat-view { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        #chat-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .bubble { max-width: 85%; padding: 12px; border-radius: 18px; font-size: 0.85rem; line-height: 1.4; }
        .msg-me { align-self: flex-end; background: #fff; color: #000; font-weight: 500; }
        .msg-ai { align-self: flex-start; background: rgba(0, 122, 255, 0.1); border: 1px solid var(--ai); color: #fff; }
        .msg-human { align-self: flex-start; background: rgba(0, 255, 65, 0.1); border: 1px solid var(--accent); color: #fff; }
        .system-text { font-size: 0.65rem; color: #666; text-align: center; margin-top: 5px; }

        /* INPUT */
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--gray); }
        input { flex: 1; background: #111; border: 1px solid var(--gray); color: white; padding: 12px; border-radius: 15px; outline: none; }
        .send-btn { background: #fff; border: none; border-radius: 15px; padding: 10px 15px; font-weight: bold; cursor: pointer; }

        /* VUES SECONDAIRES */
        .view { display: none; height: 100%; overflow-y: auto; padding-bottom: 80px; }
        .view.active { display: flex; flex-direction: column; }

        /* NAVIGATION */
        .tab-bar { position: absolute; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--gray); }
        .tab-btn { color: #444; font-size: 0.6rem; font-weight: bold; text-align: center; cursor: pointer; }
        .tab-btn.active { color: #fff; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="mode-selector">
            <div id="ai-tab" class="btn-mode active-ai" onclick="switchMode('AI')">MODE IA</div>
            <div id="human-tab" class="btn-mode" onclick="switchMode('HUMAN')">MODE HUMAIN</div>
        </div>

        <div id="v-chat" class="view active">
            <div id="chat-content">
                <div class="system-text">Connexion établie. Mode IA actif par défaut.</div>
            </div>
            <div class="input-area">
                <input type="text" id="mainInput" placeholder="Pose ta question...">
                <button class="send-btn" onclick="process()">OK</button>
            </div>
        </div>

        <div id="v-missions" class="view" style="padding: 20px;">
            <h3 style="color: var(--accent); font-size: 0.8rem;">MISSIONS DISPONIBLES</h3>
            <div id="mission-list" style="display: flex; flex-direction: column; gap: 10px;">
                </div>
        </div>

        <div id="v-profile" class="view" style="text-align: center; padding-top: 50px;">
            <div style="width: 80px; height: 80px; background: #222; border-radius: 50%; margin: 0 auto 20px; border: 2px solid var(--accent);"></div>
            <h2>L'HUMAIN #001</h2>
            <p id="profile-bp" style="color: var(--accent); font-weight: bold;">840 Bio-Points</p>
        </div>

        <div class="tab-bar">
            <div class="tab-btn active" onclick="nav('chat', this)">CHAT</div>
            <div class="tab-btn" onclick="nav('missions', this)">MISSIONS</div>
            <div class="tab-btn" onclick="nav('profile', this)">PROFIL</div>
        </div>
    </div>

    <script>
        let mode = 'AI';
        let bp = 840;

        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('ai-tab').className = (mode === 'AI') ? 'btn-mode active-ai' : 'btn-mode';
            document.getElementById('human-tab').className = (mode === 'HUMAN') ? 'btn-mode active-human' : 'btn-mode';
            
            const chat = document.getElementById('chat-content');
            const note = document.createElement('div');
            note.className = 'system-text';
            note.innerText = "--- Passage en " + mode + " ---";
            chat.appendChild(note);
        }

        function nav(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + viewId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function process() {
            const input = document.getElementById('mainInput');
            const chat = document.getElementById('chat-content');
            const mList = document.getElementById('mission-list');

            if (input.value.trim() === "") return;

            // 1. Mon message
            const myMsg = document.createElement('div');
            myMsg.className = 'bubble msg-me';
            myMsg.innerText = input.value;
            chat.appendChild(myMsg);

            const userVal = input.value;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            // 2. Réponse auto
            setTimeout(() => {
                const reply = document.createElement('div');
                if (mode === 'AI') {
                    reply.className = 'bubble msg-ai';
                    reply.innerText = "[IA] : Voici une réponse instantanée générée par l'algorithme. (Gain : 0 BP)";
                } else {
                    reply.className = 'bubble msg-human';
                    reply.innerText = "[HUMAIN] : Votre question a été envoyée aux Résistants. Un humain va répondre. (Gain : +100 BP)";
                    
                    // Ajouter dans MISSIONS
                    const card = document.createElement('div');
                    card.style = "background:#1a1a1a; padding:15px; border-radius:15px; border-left:4px solid var(--accent);";
                    card.innerHTML = `<div style="font-size:0.8rem; margin-bottom:10px;">${userVal}</div><button style="background:var(--accent); border:none; padding:5px 10px; border-radius:5px; font-weight:bold; font-size:0.6rem;">RÉPONDRE</button>`;
                    mList.prepend(card);
                }
                chat.appendChild(reply);
                chat.scrollTop = chat.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
